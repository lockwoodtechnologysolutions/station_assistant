name: "Station Assistant"
description: "Fire station alerting for Home Assistant. Two-tone paging decoder with stacked dispatch display, alert dashboard, and weather integration."
version: "1.3.2"
slug: "station_assistant_2"
url: "https://github.com/local/station-assistant"
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
init: false
startup: application
boot: auto
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: "mdi:fire-station"
panel_title: "Station Assistant"
audio: true
ports:
  "8099/tcp": 8099
ports_description:
  "8099/tcp": "Alert Dashboard (kiosk/direct access, no HA login required)"
map:
  - type: data
    read_only: false
  - type: config
    read_only: false
  - type: media
    read_only: false
options:
  audio_device_index: -1
  sample_rate: 44100
  chunk_size: 2048
  log_retention_days: 30
  input_gain: 50
schema:
  audio_device_index: int
  sample_rate: int
  chunk_size: int
  log_retention_days: int
  input_gain: int
